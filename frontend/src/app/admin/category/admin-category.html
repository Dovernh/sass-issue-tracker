<section class="admin-page">
  <header class="admin-page__header">
    <h1 class="admin-page__title">{{ 'categories.heading' | translate }}</h1>
  </header>

  @if (categories.isLoading()) {
    <p class="admin-page__status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      {{ 'categories.loading' | translate }}
    </p>
  } @else if (categories.error()) {
    <p class="admin-page__status admin-page__status--error" role="alert">
      <i class="bi bi-exclamation-octagon" aria-hidden="true"></i>

      {{ 'categories.loadError' | translate }}

      <button type="button" class="admin-page__retry" (click)="categories.reload()">
        {{ 'common.retry' | translate }}
      </button>
    </p>
  } @else {
    <app-option-list-editor
      [items]="items()"
      [languages]="languages()"
      [addLabel]="'categories.add' | translate"
      entityLabel="category"
      [canManage]="canManage()"
      (create)="onCreate($event)"
      (update)="onUpdate($event)"
      (remove)="onRemove($event)"
    />
  }
</section>
