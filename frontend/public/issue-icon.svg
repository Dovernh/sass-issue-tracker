    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(45 32 41)"/>
    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(90 32 41)"/>
    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(135 32 41)"/>
    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(180 32 41)"/>
    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(225 32 41)"/>
    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(270 32 41)"/>
    <rect x="29.5" y="26" width="5" height="7" rx="1" transform="rotate(315 32 41)"/>
    <circle cx="32" cy="41" r="9"/>
  </g>
  <!-- hub -->
  <circle cx="32" cy="41" r="3.5" fill="#fff8e6"/>
